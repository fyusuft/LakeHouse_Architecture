version: '3'

services:

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  dashboard:
    build: .
    container_name: dashboard
    command: streamlit run app.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app